name: Real Web to APK Builder

on:
  repository_dispatch:
    types: [build-apk, build_apk]

permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📝 Synchronize & Update Run ID in Firebase
        run: |
          DOC_ID="${{ github.event.client_payload.docId }}"
          PROJECT_ID="my-app-ae88f"
          # সিকিউরিটির জন্য API_KEY টি GitHub Secrets এ ব্যবহার করার পরামর্শ দেওয়া হলো
          API_KEY="${{ secrets.FIREBASE_API_KEY }}"
          if [ -z "$API_KEY" ]; then API_KEY="AIzaSyAo9ddKYbaCiIz5iwCNJN0pxs3UQvBvrTI"; fi
          
          curl -X PATCH "https://firestore.googleapis.com/v1/projects/$PROJECT_ID/databases/(default)/documents/apk_builds/$DOC_ID?key=$API_KEY&updateMask.fieldPaths=runId" \
          -H "Content-Type: application/json" \
          -d "{
            \"fields\": {
              \"runId\": { \"stringValue\": \"${{ github.run_id }}\" }
            }
          }"

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: ☕ Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 📦 Install Cordova
        run: npm install -g cordova

      - name: 🛠️ Create App Environment & Optimize Source
        run: |
          BUILD_TYPE="${{ github.event.client_payload.buildType }}"
          URL="${{ github.event.client_payload.url }}"
          RAW_CODE="${{ github.event.client_payload.rawCode }}"
          APP_NAME="${{ github.event.client_payload.appName }}"
          ICON_URL="${{ github.event.client_payload.appIcon }}"
          PKG_NAME="${{ github.event.client_payload.packageName }}"
          VERSION="${{ github.event.client_payload.version }}"
          AD_STATUS="${{ github.event.client_payload.adStatus }}"
          STARTIO_APP_ID="${{ github.event.client_payload.startioAppId }}"
          
          if [ -z "$APP_NAME" ]; then APP_NAME="MyWebApp"; fi
          if [ -z "$PKG_NAME" ]; then PKG_NAME="com.web2apk.app${GITHUB_RUN_ID}.apk"; fi
          if [ -z "$VERSION" ]; then VERSION="1.0.0"; fi
          if [ -z "$AD_STATUS" ]; then AD_STATUS="false"; fi
          
          SAFE_APP_NAME="${APP_NAME//&/&amp;}"
          SAFE_APP_NAME="${SAFE_APP_NAME//</&lt;}"
          SAFE_APP_NAME="${SAFE_APP_NAME//>/&gt;}"
          
          PKG_PATH=$(echo $PKG_NAME | tr '.' '/')
          echo "GENERATED_PKG_NAME=$PKG_NAME" >> $GITHUB_ENV
          
          # Create Base Cordova Project
          cordova create myapp $PKG_NAME "$APP_NAME"
          cd myapp
          
          mkdir -p res
          curl -sL "$ICON_URL" -o res/icon.png || true

          # 🎯 Logic: URL vs Raw Code Editor
          if [ "$BUILD_TYPE" = "raw" ]; then
              echo "Processing Raw Editor Code..."
              mkdir -p www
              echo "$RAW_CODE" | base64 --decode > www/index.html
              CONTENT_SRC="index.html"
          else
              echo "Processing Live URL..."
              if [ -z "$URL" ]; then URL="https://google.com"; fi
              SAFE_URL="${URL//&/&amp;}"
              SAFE_URL="${SAFE_URL//</&lt;}"
              SAFE_URL="${SAFE_URL//>/&gt;}"
              CONTENT_SRC="$SAFE_URL"
          fi
          
          # Generate config.xml dynamically
          cat <<EOF > config.xml
          <?xml version='1.0' encoding='utf-8'?>
          <widget id="$PKG_NAME" version="$VERSION" xmlns="http://www.w3.org/ns/widgets" xmlns:android="http://schemas.android.com/apk/res/android">
              <name>$SAFE_APP_NAME</name>
              <content src="$CONTENT_SRC" />
              <allow-navigation href="*" />
              
              <preference name="AndroidWindowSplashScreenAnimatedIcon" value="res/icon.png" />
              <preference name="AndroidWindowSplashScreenBackground" value="#FFFFFF" />
              <preference name="SplashScreenDelay" value="3000" />
              <preference name="FadeSplashScreenDuration" value="500" />
              <preference name="ShowSplashScreenSpinner" value="false" />
              
              <icon src="res/icon.png" />
              
              <platform name="android">
                  <config-file target="AndroidManifest.xml" parent="/*">
                      <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
                      <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
                      <uses-permission android:name="android.permission.INTERNET" />
                      <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
                      <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />
                  </config-file>
                  <edit-config file="app/src/main/AndroidManifest.xml" mode="merge" target="/manifest/application">
                      <application android:requestLegacyExternalStorage="true" android:hardwareAccelerated="true" />
                  </edit-config>
              </platform>
          </widget>
          EOF

          cordova platform add android
          
          sed -i 's/repo.maven.apache.org\/maven2/repo1.maven.org\/maven2/g' platforms/android/build.gradle
          sed -i 's/repo.maven.apache.org\/maven2/repo1.maven.org\/maven2/g' platforms/android/app/build.gradle
          
          # ⚡ কন্ডিশনাল অ্যাড নেটওয়ার্ক ইনজেকশন (Ad Status True হলেই কেবল SDK যুক্ত হবে)
          if [ "$AD_STATUS" = "true" ] && [ -n "$STARTIO_APP_ID" ]; then
              echo "Injecting Start.io SDK Dependencies..."
              sed -i -e '/repositories {/a \        maven { url "https://init.startappservice.com/maven/" }' platforms/android/build.gradle
              sed -i -e '/repositories {/a \        maven { url "https://init.startappservice.com/maven/" }' platforms/android/app/build.gradle
              echo "dependencies { implementation 'com.startapp:inapp-sdk:5.1.0' }" >> platforms/android/app/build.gradle
          fi
          
          MAIN_ACTIVITY_PATH="platforms/android/app/src/main/java/$PKG_PATH/MainActivity.java"
          
          # 🛠️ ডায়নামিক MainActivity.java জেনারেশন (অ্যাড অন/অফ এর ওপর ভিত্তি করে)
          if [ "$AD_STATUS" = "true" ] && [ -n "$STARTIO_APP_ID" ]; then
              echo "Generating MainActivity with Start.io Ads Integration..."
              cat << 'JAVAEOF' > "$MAIN_ACTIVITY_PATH"
          package PLACEHOLDER_PACKAGE;

          import android.os.Bundle;
          import org.apache.cordova.*;
          import android.webkit.DownloadListener;
          import android.app.DownloadManager;
          import android.net.Uri;
          import android.os.Environment;
          import android.widget.Toast;
          import android.webkit.CookieManager;
          import android.webkit.WebSettings;
          import android.webkit.URLUtil;
          import android.webkit.MimeTypeMap;
          import org.apache.cordova.engine.SystemWebView;
          import android.util.Base64;
          import java.io.OutputStream;
          import android.content.ContentValues;
          import android.provider.MediaStore;
          import android.webkit.JavascriptInterface;

          import com.startapp.sdk.adsbase.StartAppAd;
          import com.startapp.sdk.adsbase.StartAppSDK;

          public class MainActivity extends CordovaActivity {
              private long lastAdShowTime = 0;
              private StartAppAd startAppAd;

              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  Bundle extras = getIntent().getExtras();
                  if (extras != null && extras.getBoolean("cdvStartInBackground", false)) {
                      moveTaskToBack(true);
                  }
                  
                  try {
                      StartAppSDK.setTestAdsEnabled(false); // লাইভ অ্যাড এর জন্য false করা হলো
                      StartAppAd.disableSplash();
                      StartAppSDK.init(this, "PLACEHOLDER_STARTIO_ID", false);
                      
                      startAppAd = new StartAppAd(this);
                      startAppAd.loadAd();
                      
                      new android.os.Handler(android.os.Looper.getMainLooper()).postDelayed(new Runnable() {
                          @Override
                          public void run() {
                              showInterstitialAdWithCapping();
                          }
                      }, 10000);
                      
                  } catch (Exception e) {
                      e.printStackTrace();
                  }

                  loadUrl(launchUrl);
                  setupWebViewSettings();
              }

              private void setupWebViewSettings() {
                  SystemWebView webView = (SystemWebView) appView.getView();
                  WebSettings settings = webView.getSettings();
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  settings.setCacheMode(WebSettings.LOAD_DEFAULT);

                  webView.addJavascriptInterface(new Object() {
                      @JavascriptInterface
                      public void getBase64FromBlobData(String base64Data) {
                          runOnUiThread(() -> showInterstitialAdWithCapping());
                          processBase64Download(base64Data);
                      }
                  }, "AndroidDownloader");

                  setupDownloadListener(webView);
              }

              private void processBase64Download(String base64Data) {
                  try {
                      String[] urlParts = base64Data.split(",");
                      String base64File = urlParts[1];
                      byte[] fileBytes = Base64.decode(base64File, 0);
                      String mimeType = "application/octet-stream";
                      String extension = ".bin";
                      
                      try {
                          if(urlParts[0].contains(":")) {
                              mimeType = urlParts[0].substring(urlParts[0].indexOf(":") + 1, urlParts[0].indexOf(";"));
                              String ext = MimeTypeMap.getSingleton().getExtensionFromMimeType(mimeType);
                              if(ext != null) extension = "." + ext;
                          }
                      } catch(Exception e) {}
                      
                      String fileName = "Download_" + System.currentTimeMillis() + extension;
                      ContentValues values = new ContentValues();
                      values.put(MediaStore.MediaColumns.DISPLAY_NAME, fileName);
                      values.put(MediaStore.MediaColumns.MIME_TYPE, mimeType);
                      values.put(MediaStore.MediaColumns.RELATIVE_PATH, Environment.DIRECTORY_DOWNLOADS);
                      
                      Uri uri = getContentResolver().insert(MediaStore.Downloads.EXTERNAL_CONTENT_URI, values);
                      if (uri != null) {
                          OutputStream out = getContentResolver().openOutputStream(uri);
                          out.write(fileBytes);
                          out.close();
                          runOnUiThread(() -> Toast.makeText(getApplicationContext(), "ফাইল সেভ হয়েছে!", Toast.LENGTH_LONG).show());
                      }
                  } catch (Exception e) {
                      runOnUiThread(() -> Toast.makeText(getApplicationContext(), "ডাউনলোড এরর হচ্ছে!", Toast.LENGTH_SHORT).show());
                  }
              }

              private void setupDownloadListener(SystemWebView webView) {
                  webView.setDownloadListener(new DownloadListener() {
                      public void onDownloadStart(String url, String userAgent, String contentDisposition, String mimetype, long contentLength) {
                          runOnUiThread(() -> showInterstitialAdWithCapping());

                          if (url.startsWith("blob:")) {
                              String js = "javascript: var xhr = new XMLHttpRequest(); xhr.open('GET', '" + url + "', true); xhr.responseType = 'blob'; xhr.onload = function(e) { if (this.status == 200) { var reader = new FileReader(); reader.readAsDataURL(this.response); reader.onloadend = function() { AndroidDownloader.getBase64FromBlobData(reader.result); } } }; xhr.send();";
                              webView.evaluateJavascript(js, null);
                              runOnUiThread(() -> Toast.makeText(getApplicationContext(), "ডাউনলোড শুরু হচ্ছে...", Toast.LENGTH_SHORT).show());
                          } else if (url.startsWith("data:")) {
                              webView.evaluateJavascript("javascript:AndroidDownloader.getBase64FromBlobData('" + url + "');", null);
                              runOnUiThread(() -> Toast.makeText(getApplicationContext(), "ডাউনলোড শুরু হচ্ছে...", Toast.LENGTH_SHORT).show());
                          } else {
                              String fileName = URLUtil.guessFileName(url, contentDisposition, mimetype);
                              DownloadManager.Request request = new DownloadManager.Request(Uri.parse(url));
                              request.setMimeType(mimetype);
                              request.addRequestHeader("cookie", CookieManager.getInstance().getCookie(url));
                              request.allowScanningByMediaScanner();
                              request.setNotificationVisibility(DownloadManager.Request.VISIBILITY_VISIBLE_NOTIFY_COMPLETED);
                              request.setDestinationInExternalPublicDir(Environment.DIRECTORY_DOWNLOADS, fileName);
                              ((DownloadManager) getSystemService(DOWNLOAD_SERVICE)).enqueue(request);
                              runOnUiThread(() -> Toast.makeText(getApplicationContext(), "ডাউনলোড শুরু হয়েছে...", Toast.LENGTH_LONG).show());
                          }
                      }
                  });
              }

              private void showInterstitialAdWithCapping() {
                  long currentTime = System.currentTimeMillis();
                  if (currentTime - lastAdShowTime > 120000 || lastAdShowTime == 0) { 
                      try {
                          if (startAppAd != null && startAppAd.isReady()) {
                              startAppAd.showAd();
                              lastAdShowTime = currentTime;
                              startAppAd.loadAd();
                          } else if (startAppAd != null) {
                              startAppAd.loadAd();
                          }
                      } catch (Exception e) {
                          e.printStackTrace();
                      }
                  }
              }
          }
          JAVAEOF
              sed -i "s/PLACEHOLDER_STARTIO_ID/$STARTIO_APP_ID/g" "$MAIN_ACTIVITY_PATH"
          else
              echo "Generating Clean MainActivity (No Ads)..."
              cat << 'JAVAEOF' > "$MAIN_ACTIVITY_PATH"
          package PLACEHOLDER_PACKAGE;

          import android.os.Bundle;
          import org.apache.cordova.*;
          import android.webkit.DownloadListener;
          import android.app.DownloadManager;
          import android.net.Uri;
          import android.os.Environment;
          import android.widget.Toast;
          import android.webkit.CookieManager;
          import android.webkit.WebSettings;
          import android.webkit.URLUtil;
          import android.webkit.MimeTypeMap;
          import org.apache.cordova.engine.SystemWebView;
          import android.util.Base64;
          import java.io.OutputStream;
          import android.content.ContentValues;
          import android.provider.MediaStore;
          import android.webkit.JavascriptInterface;

          public class MainActivity extends CordovaActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  Bundle extras = getIntent().getExtras();
                  if (extras != null && extras.getBoolean("cdvStartInBackground", false)) {
                      moveTaskToBack(true);
                  }
                  loadUrl(launchUrl);
                  setupWebViewSettings();
              }

              private void setupWebViewSettings() {
                  SystemWebView webView = (SystemWebView) appView.getView();
                  WebSettings settings = webView.getSettings();
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  settings.setCacheMode(WebSettings.LOAD_DEFAULT);

                  webView.addJavascriptInterface(new Object() {
                      @JavascriptInterface
                      public void getBase64FromBlobData(String base64Data) {
                          processBase64Download(base64Data);
                      }
                  }, "AndroidDownloader");

                  setupDownloadListener(webView);
              }

              private void processBase64Download(String base64Data) {
                  try {
                      String[] urlParts = base64Data.split(",");
                      String base64File = urlParts[1];
                      byte[] fileBytes = Base64.decode(base64File, 0);
                      String mimeType = "application/octet-stream";
                      String extension = ".bin";
                      
                      try {
                          if(urlParts[0].contains(":")) {
                              mimeType = urlParts[0].substring(urlParts[0].indexOf(":") + 1, urlParts[0].indexOf(";"));
                              String ext = MimeTypeMap.getSingleton().getExtensionFromMimeType(mimeType);
                              if(ext != null) extension = "." + ext;
                          }
                      } catch(Exception e) {}
                      
                      String fileName = "Download_" + System.currentTimeMillis() + extension;
                      ContentValues values = new ContentValues();
                      values.put(MediaStore.MediaColumns.DISPLAY_NAME, fileName);
                      values.put(MediaStore.MediaColumns.MIME_TYPE, mimeType);
                      values.put(MediaStore.MediaColumns.RELATIVE_PATH, Environment.DIRECTORY_DOWNLOADS);
                      
                      Uri uri = getContentResolver().insert(MediaStore.Downloads.EXTERNAL_CONTENT_URI, values);
                      if (uri != null) {
                          OutputStream out = getContentResolver().openOutputStream(uri);
                          out.write(fileBytes);
                          out.close();
                          runOnUiThread(() -> Toast.makeText(getApplicationContext(), "ফাইল সেভ হয়েছে!", Toast.LENGTH_LONG).show());
                      }
                  } catch (Exception e) {
                      runOnUiThread(() -> Toast.makeText(getApplicationContext(), "ডাউনলোড এরর হচ্ছে!", Toast.LENGTH_SHORT).show());
                  }
              }

              private void setupDownloadListener(SystemWebView webView) {
                  webView.setDownloadListener(new DownloadListener() {
                      public void onDownloadStart(String url, String userAgent, String contentDisposition, String mimetype, long contentLength) {
                          if (url.startsWith("blob:")) {
                              String js = "javascript: var xhr = new XMLHttpRequest(); xhr.open('GET', '" + url + "', true); xhr.responseType = 'blob'; xhr.onload = function(e) { if (this.status == 200) { var reader = new FileReader(); reader.readAsDataURL(this.response); reader.onloadend = function() { AndroidDownloader.getBase64FromBlobData(reader.result); } } }; xhr.send();";
                              webView.evaluateJavascript(js, null);
                              runOnUiThread(() -> Toast.makeText(getApplicationContext(), "ডাউনলোড শুরু হচ্ছে...", Toast.LENGTH_SHORT).show());
                          } else if (url.startsWith("data:")) {
                              webView.evaluateJavascript("javascript:AndroidDownloader.getBase64FromBlobData('" + url + "');", null);
                              runOnUiThread(() -> Toast.makeText(getApplicationContext(), "ডাউনলোড শুরু হচ্ছে...", Toast.LENGTH_SHORT).show());
                          } else {
                              String fileName = URLUtil.guessFileName(url, contentDisposition, mimetype);
                              DownloadManager.Request request = new DownloadManager.Request(Uri.parse(url));
                              request.setMimeType(mimetype);
                              request.addRequestHeader("cookie", CookieManager.getInstance().getCookie(url));
                              request.allowScanningByMediaScanner();
                              request.setNotificationVisibility(DownloadManager.Request.VISIBILITY_VISIBLE_NOTIFY_COMPLETED);
                              request.setDestinationInExternalPublicDir(Environment.DIRECTORY_DOWNLOADS, fileName);
                              ((DownloadManager) getSystemService(DOWNLOAD_SERVICE)).enqueue(request);
                              runOnUiThread(() -> Toast.makeText(getApplicationContext(), "ডাউনলোড শুরু হয়েছে...", Toast.LENGTH_LONG).show());
                          }
                      }
                  });
              }
          }
          JAVAEOF
          fi
          
          sed -i "s/PLACEHOLDER_PACKAGE/$PKG_NAME/g" "$MAIN_ACTIVITY_PATH"

      - name: 🚀 Compile APK (Gradle Build)
        run: |
          cd myapp
          cordova build android
          cp platforms/android/app/build/outputs/apk/debug/app-debug.apk ../${{ github.event.client_payload.docId }}.apk

      - name: ☁️ Upload APK to GitHub Releases
        id: upload_release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: apk-${{ github.event.client_payload.docId }}
          name: APK Build ${{ github.event.client_payload.docId }}
          files: ./${{ github.event.client_payload.docId }}.apk

      - name: 🔄 Update Firebase Data
        if: always()
        run: |
          DOC_ID="${{ github.event.client_payload.docId }}"
          PROJECT_ID="my-app-ae88f"
          API_KEY="${{ secrets.FIREBASE_API_KEY }}"
          if [ -z "$API_KEY" ]; then API_KEY="AIzaSyAo9ddKYbaCiIz5iwCNJN0pxs3UQvBvrTI"; fi
          
          if [ "${{ job.status }}" = "success" ]; then
            STATUS="completed"
            DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/apk-$DOC_ID/$DOC_ID.apk"
          else
            STATUS="failed"
            DOWNLOAD_URL=""
          fi
          
          curl -X PATCH "https://firestore.googleapis.com/v1/projects/$PROJECT_ID/databases/(default)/documents/apk_builds/$DOC_ID?key=$API_KEY&updateMask.fieldPaths=status&updateMask.fieldPaths=downloadUrl" \
          -H "Content-Type: application/json" \
          -d "{
            \"fields\": {
              \"status\": { \"stringValue\": \"$STATUS\" },
              \"downloadUrl\": { \"stringValue\": \"$DOWNLOAD_URL\" }
            }
          }"
