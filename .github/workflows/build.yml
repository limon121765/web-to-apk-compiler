name: Real Web to APK Builder

on:
  repository_dispatch:
    types: [build-apk, build_apk]

permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: —В–™–©—ПвХХ–Я Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: —В–®–• Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: –Б–ѓ–£–ґ Install Cordova
        run: npm install -g cordova

      - name: –Б–ѓ–Ђ–∞—ПвХХ–Я Create App Environment & Optimize Speed
        run: |
          URL="${{ github.event.client_payload.url }}"
          APP_NAME="${{ github.event.client_payload.appName }}"
          ICON_URL="${{ github.event.client_payload.appIcon }}"
          PKG_NAME="${{ github.event.client_payload.packageName }}"
          VERSION="${{ github.event.client_payload.version }}"
          
          if [ -z "$URL" ]; then URL="https://google.com"; fi
          if [ -z "$APP_NAME" ]; then APP_NAME="MyWebApp"; fi
          if [ -z "$PKG_NAME" ]; then PKG_NAME="com.web2apk.app${GITHUB_RUN_ID}"; fi
          if [ -z "$VERSION" ]; then VERSION="1.0.0"; fi
          
          PKG_PATH=$(echo $PKG_NAME | tr '.' '/')
          echo "GENERATED_PKG_NAME=$PKG_NAME" >> $GITHUB_ENV
          
          cordova create myapp $PKG_NAME "$APP_NAME"
          cd myapp
          cordova platform add android
          
          mkdir -p res
          curl -sL "$ICON_URL" -o res/icon.png || true

          # XML —А–ґвХХ—А–Ј–Э—А–ґ–Ї—А–Ј–Ч—А–ґвХҐ—А–ґвХЫ—А–ґвЦУ —А–ґ–•—А–Ј–Э—А–ґ–њ—А–ґвХЫ—А–ґвЦС—А–Ј–Ч—А–ґ–•—А–Ј–Э—А–ґ–ѓ—А–ґвХЫ—А–ґвЦС —А–ґ–Я—А–ґвХХ—А–Ј–Э—А–ґ–•—А–Ј–Ч—А–ґ–Ї —А–ґ–•—А–ґвЦС—А–ґвХЫ—А–ґвЦС —А–ґ–ї—А–ґвХЫ—А–ґ–Т—А–ґвХҐ—А–ґ–Є (& < > " —А–ґ–љ—А–Ј–Ч—А–ґ–©—А–Ј–Ч —А–ґ–њ—А–ґвХЫ—А–ґ–£—А–ґ–њ—А–ґвХЭ—А–ґвХЫ —А–ґ–∞—А–Ј–Ч—А–ґ–•—А–ґвХЫ—А–ґ–і—А–Ј–Ч)
          escape_xml() {
            echo "$1" | sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g' -e 's/"/\&quot;/g'
          }
          ESC_URL=$(escape_xml "$URL")
          ESC_APP_NAME=$(escape_xml "$APP_NAME")

          cat <<EOF > config.xml
          <?xml version='1.0' encoding='utf-8'?>
<widget id="$PKG_NAME" version="$VERSION" xmlns="http://www.w3.org/ns/widgets" xmlns:android="http://schemas.android.com/apk/res/android">
<name>$ESC_APP_NAME</name>
<content src="$ESC_URL" />
<allow-navigation href="*" />
<preference name="AndroidWindowSplashScreenAnimatedIcon" value="res/icon.png" />
<preference name="AndroidWindowSplashScreenBackground" value="#FFFFFF" />
<preference name="SplashScreenDelay" value="0" />
<preference name="FadeSplashScreenDuration" value="0" />
<preference name="ShowSplashScreenSpinner" value="false" />
<icon src="res/icon.png" />
<platform name="android">
<config-file target="AndroidManifest.xml" parent="/*">
<uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
<uses-permission android:name="android.permission.INTERNET" />
<uses-permission android:name="com.google.android.gms.permission.AD_ID" />
</config-file>
<edit-config file="app/src/main/AndroidManifest.xml" mode="merge" target="/manifest/application">
<application android:requestLegacyExternalStorage="true" android:hardwareAccelerated="true" />
</edit-config>
</platform>
</widget>
EOF

          echo "----- Generated config.xml -----"
          cat config.xml
        
          # Start.io SDK v5.x —А–ґ–±—А–ґвФР—А–ґ–Ї—А–Ј–Ч—А–ґ–Є—А–Ј–Э—А–ґ–±—А–Ј–Ч—А–ґ–Є—А–Ј–Э—А–ґвХХ—А–ґвФР —А–ґ–њ—А–Ј–С—А–ґ–•—А–Ј–Э—А–ґ–і —А–ґ–•—А–ґвЦС—А–ґвХЫ—А–ґвЦС —А–ґ–ђ—А–ґ–Є—А–Ј–Э—А–ґ–њ build-extras.gradle —А–ґ–і—А–Ј–Ш—А–ґвЦС—А–ґвФР
          cat <<EOF > platforms/android/app/build-extras.gradle
          repositories {
              maven { url "https://init.startappservice.com/jars" }
          }
          dependencies {
              implementation 'com.startapp:inapp-sdk:5.+'
          }
          EOF

          MAIN_ACTIVITY_PATH="platforms/android/app/src/main/java/$PKG_PATH/MainActivity.java"
          
          cat << 'JAVAEOF' > "$MAIN_ACTIVITY_PATH"
          package PLACEHOLDER_PACKAGE;

          import android.os.Bundle;
          import org.apache.cordova.*;
          import android.webkit.DownloadListener;
          import android.app.DownloadManager;
          import android.net.Uri;
          import android.os.Environment;
          import android.widget.Toast;
          import android.webkit.CookieManager;
          import android.webkit.WebSettings;
          import android.webkit.URLUtil;
          import android.webkit.MimeTypeMap;
          import org.apache.cordova.engine.SystemWebView;
          import android.util.Base64;
          import java.io.OutputStream;
          import android.content.ContentValues;
          import android.provider.MediaStore;
          import android.webkit.JavascriptInterface;

          // Start.io SDK Imports
          import com.startapp.sdk.init.StartAppSDK;
          import com.startapp.sdk.adsbase.StartAppAd;

          public class MainActivity extends CordovaActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  // Start.io SDK v5.x Initialization with your App ID
                  StartAppSDK.initParams(this, "205114735")
                      .setReturnAdsEnabled(true)
                      .setCallback(() -> {
                          // SDK ready, ads can now be requested
                      })
                      .init();
                  StartAppAd.disableSplash(); // Default Splash Screen Ad Disabled
                  
                  Bundle extras = getIntent().getExtras();
                  if (extras != null && extras.getBoolean("cdvStartInBackground", false)) {
                      moveTaskToBack(true);
                  }
                  loadUrl(launchUrl);

                  SystemWebView webView = (SystemWebView) appView.getView();
                  
                  WebSettings settings = webView.getSettings();
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  settings.setCacheMode(WebSettings.LOAD_DEFAULT);

                  webView.addJavascriptInterface(new Object() {
                      @JavascriptInterface
                      public void getBase64FromBlobData(String base64Data) {
                          try {
                              // Show Ad on JS Download
                              runOnUiThread(() -> StartAppAd.showAd(MainActivity.this));
                              
                              String[] urlParts = base64Data.split(",");
                              String base64File = urlParts[1];
                              byte[] fileBytes = Base64.decode(base64File, 0);
                              
                              String mimeType = "application/octet-stream";
                              String extension = ".bin";
                              
                              try {
                                  if(urlParts[0].contains(":")) {
                                      mimeType = urlParts[0].substring(urlParts[0].indexOf(":") + 1, urlParts[0].indexOf(";"));
                                      String ext = MimeTypeMap.getSingleton().getExtensionFromMimeType(mimeType);
                                      if(ext != null) {
                                          extension = "." + ext;
                                      } else if (mimeType.contains("pdf")) {
                                          extension = ".pdf";
                                      } else if (mimeType.contains("image/png")) {
                                          extension = ".png";
                                      } else if (mimeType.contains("image/jpeg")) {
                                          extension = ".jpg";
                                      }
                                  }
                              } catch(Exception e) {}
                              
                              String fileName = "Download_" + System.currentTimeMillis() + extension;
                              
                              ContentValues values = new ContentValues();
                              values.put(MediaStore.MediaColumns.DISPLAY_NAME, fileName);
                              values.put(MediaStore.MediaColumns.MIME_TYPE, mimeType);
                              values.put(MediaStore.MediaColumns.RELATIVE_PATH, Environment.DIRECTORY_DOWNLOADS);
                              
                              Uri uri = getContentResolver().insert(MediaStore.Downloads.EXTERNAL_CONTENT_URI, values);
                              if (uri != null) {
                                  OutputStream out = getContentResolver().openOutputStream(uri);
                                  out.write(fileBytes);
                                  out.close();
                                  runOnUiThread(() -> Toast.makeText(getApplicationContext(), "—А–ґ–ї—А–ґвХЫ—А–ґ–Ч—А–ґвЦУ —А–ґвХХ—А–Ј–Ч—А–ґ–љ —А–ґвХ£—А–ґ–њ—А–ґвХЭ—А–Ј–Ч—А–ґ–Ђ—А–Ј–Ч!", Toast.LENGTH_LONG).show());
                              }
                          } catch (Exception e) {
                              runOnUiThread(() -> Toast.makeText(getApplicationContext(), "—А–ґ–±—А–ґвХЫ—А–ґ–Щ—А–ґ–Є—А–ґвЦУ—А–Ј–Ы—А–ґ–± —А–ґ–Я—А–ґвЦС—А–ґвЦС —А–ґвХ£—А–ґ–™—А–Ј–Э—А–ґ–Ђ—А–Ј–Ч!", Toast.LENGTH_SHORT).show());
                          }
                      }
                      
                      // Custom Interface to show Ad manually from your Single HTML pages
                      @JavascriptInterface
                      public void showInterstitialAd() {
                          runOnUiThread(() -> StartAppAd.showAd(MainActivity.this));
                      }
                  }, "AndroidDownloader");

                  webView.setDownloadListener(new DownloadListener() {
                      public void onDownloadStart(String url, String userAgent, String contentDisposition, String mimetype, long contentLength) {
                          
                          // Show Ad on URL Download
                          runOnUiThread(() -> StartAppAd.showAd(MainActivity.this));

                          if (url.startsWith("blob:")) {
                              String js = "javascript: " +
                                  "var xhr = new XMLHttpRequest();" +
                                  "xhr.open('GET', '" + url + "', true);" +
                                  "xhr.responseType = 'blob';" +
                                  "xhr.onload = function(e) {" +
                                  "    if (this.status == 200) {" +
                                  "        var blob = this.response;" +
                                  "        var reader = new FileReader();" +
                                  "        reader.readAsDataURL(blob);" +
                                  "        reader.onloadend = function() {" +
                                  "            AndroidDownloader.getBase64FromBlobData(reader.result);" +
                                  "        }" +
                                  "    }" +
                                  "};" +
                                  "xhr.send();";
                              webView.evaluateJavascript(js, null);
                              runOnUiThread(() -> Toast.makeText(getApplicationContext(), "—А–ґ–±—А–ґвХЫ—А–ґ–Щ—А–ґ–Є—А–ґвЦУ—А–Ј–Ы—А–ґ–± —А–ґвХҐ—А–Ј–С—А–ґвЦС—А–Ј–С —А–ґвХ£—А–ґ–™—А–Ј–Э—А–ґ–Ђ—А–Ј–Ч...", Toast.LENGTH_SHORT).show());
                          } else if (url.startsWith("data:")) {
                              webView.evaluateJavascript("javascript:AndroidDownloader.getBase64FromBlobData('" + url + "');", null);
                              runOnUiThread(() -> Toast.makeText(getApplicationContext(), "—А–ґ–±—А–ґвХЫ—А–ґ–Щ—А–ґ–Є—А–ґвЦУ—А–Ј–Ы—А–ґ–± —А–ґвХҐ—А–Ј–С—А–ґвЦС—А–Ј–С —А–ґвХ£—А–ґ–™—А–Ј–Э—А–ґ–Ђ—А–Ј–Ч...", Toast.LENGTH_SHORT).show());
                          } else {
                              String fileName = URLUtil.guessFileName(url, contentDisposition, mimetype);
                              
                              DownloadManager.Request request = new DownloadManager.Request(Uri.parse(url));
                              request.setMimeType(mimetype);
                              String cookies = CookieManager.getInstance().getCookie(url);
                              request.addRequestHeader("cookie", cookies);
                              request.allowScanningByMediaScanner();
                              request.setNotificationVisibility(DownloadManager.Request.VISIBILITY_VISIBLE_NOTIFY_COMPLETED);
                              
                              request.setDestinationInExternalPublicDir(Environment.DIRECTORY_DOWNLOADS, fileName);
                              
                              DownloadManager dm = (DownloadManager) getSystemService(DOWNLOAD_SERVICE);
                              dm.enqueue(request);
                              runOnUiThread(() -> Toast.makeText(getApplicationContext(), "—А–ґ–±—А–ґвХЫ—А–ґ–Щ—А–ґ–Є—А–ґвЦУ—А–Ј–Ы—А–ґ–± —А–ґвХҐ—А–Ј–С—А–ґвЦС—А–Ј–С —А–ґвХ£—А–ґ–њ—А–ґвХЭ—А–Ј–Ч—А–ґ–Ђ—А–Ј–Ч...", Toast.LENGTH_LONG).show());
                          }
                      }
                  });
              }
              
              // Show Ad when user exits the app or goes back
              @Override
              public void onBackPressed() {
                  StartAppAd.onBackPressed(this);
                  super.onBackPressed();
              }
          }
          JAVAEOF
          
          sed -i "s/package PLACEHOLDER_PACKAGE;/package $PKG_NAME;/g" "$MAIN_ACTIVITY_PATH"

      - name: –Б–ѓ–™–Р Compile APK (Gradle Build)
        run: |
          cd myapp
          cordova build android
          cp platforms/android/app/build/outputs/apk/debug/app-debug.apk ../${{ github.event.client_payload.docId }}.apk

      - name: —В–®–С—ПвХХ–Я Upload APK to GitHub Releases
        id: upload_release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: apk-${{ github.event.client_payload.docId }}
          name: APK Build ${{ github.event.client_payload.docId }}
          files: ./${{ github.event.client_payload.docId }}.apk

      - name: –Б–ѓ–§–Ф Update Firebase Data
        if: always()
        run: |
          DOC_ID="${{ github.event.client_payload.docId }}"
          PROJECT_ID="my-app-ae88f"
          API_KEY="AIzaSyAo9ddKYbaCiIz5iwCNJN0pxs3UQvBvrTI"
          
          if [ "${{ job.status }}" = "success" ]; then
            STATUS="completed"
            DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/apk-$DOC_ID/$DOC_ID.apk"
          else
            STATUS="failed"
            DOWNLOAD_URL=""
          fi
          
          curl -X PATCH "https://firestore.googleapis.com/v1/projects/$PROJECT_ID/databases/(default)/documents/apk_builds/$DOC_ID?key=$API_KEY&updateMask.fieldPaths=status&updateMask.fieldPaths=downloadUrl" \
          -H "Content-Type: application/json" \
          -d "{
            \"fields\": {
              \"status\": { \"stringValue\": \"$STATUS\" },
              \"downloadUrl\": { \"stringValue\": \"$DOWNLOAD_URL\" }
            }
          }"
