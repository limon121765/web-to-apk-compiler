name: Real Web to APK Builder

on:
  repository_dispatch:
    types: [build-apk, build_apk]

permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: ☕ Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 📦 Install Cordova
        run: npm install -g cordova
      - name: 🛠️ Create Android App Environment
        run: |
          # ওয়েবসাইট এবং অ্যাপ ডাটা নেওয়া
          URL="${{ github.event.client_payload.url }}"
          APP_NAME="${{ github.event.client_payload.appName }}"
          ICON_URL="${{ github.event.client_payload.appIcon }}"
          
          if [ -z "$URL" ]; then URL="https://google.com"; fi
          if [ -z "$APP_NAME" ]; then APP_NAME="MyWebApp"; fi
          
          # কর্ডোভা প্রোজেক্ট তৈরি
          cordova create myapp com.website.app "$APP_NAME"
          cd myapp
          cordova platform add android
          
          # ওয়েবসাইট লোড করার জন্য WebView তৈরি (iframe এর বদলে location.replace)
          rm -rf www/*
          cat <<EOF > www/index.html
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="utf-8">
              <title>$APP_NAME</title>
          </head>
          <body style="margin:0; padding:0; height:100vh; display:flex; justify-content:center; align-items:center;">
              <div id="loading">Loading...</div>
              <script>
                  window.location.replace("$URL");
              </script>
          </body>
          </html>
          EOF
          
      - name: 🚀 Compile APK (Gradle Build)
        run: |
          cd myapp
          cordova build android
          # বিল্ড হওয়া ফাইলটি মেইন ফোল্ডারে কপি করা
          cp platforms/android/app/build/outputs/apk/debug/app-debug.apk ../${{ github.event.client_payload.docId }}.apk

      - name: ☁️ Upload APK to GitHub Releases
        id: upload_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: apk-${{ github.event.client_payload.docId }}
          name: APK Build ${{ github.event.client_payload.docId }}
          files: ./${{ github.event.client_payload.docId }}.apk

      - name: 🔄 Update Firebase Data
        run: |
          DOC_ID="${{ github.event.client_payload.docId }}"
          PROJECT_ID="my-app-ae88f"
          API_KEY="AIzaSyAo9ddKYbaCiIz5iwCNJN0pxs3UQvBvrTI"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/apk-$DOC_ID/$DOC_ID.apk"
          
          # ফায়ারস্টোর আপডেট করা হচ্ছে
          curl -X PATCH "https://firestore.googleapis.com/v1/projects/$PROJECT_ID/databases/(default)/documents/apk_builds/$DOC_ID?key=$API_KEY&updateMask.fieldPaths=status&updateMask.fieldPaths=downloadUrl" \
          -H "Content-Type: application/json" \
          -d "{
            \"fields\": {
              \"status\": { \"stringValue\": \"completed\" },
              \"downloadUrl\": { \"stringValue\": \"$DOWNLOAD_URL\" }
            }
          }"
