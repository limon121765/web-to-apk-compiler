name: Real Web to APK Builder

on:
  repository_dispatch:
    types: [build-apk]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create and Build Cordova App
        run: |
          URL="${{ github.event.client_payload.appUrl }}"
          APP_NAME="${{ github.event.client_payload.appName }}"
          ICON_URL="${{ github.event.client_payload.appIcon }}"
          DOC_ID="${{ github.event.client_payload.docId }}"

          # Create Cordova Project
          cordova create myapp com.web2apk.app "$APP_NAME"
          cd myapp
          cordova platform add android

          # Icon Setup (Better Approach)
          mkdir -p res/icon/android
          if [ -n "$ICON_URL" ]; then
            curl -sL "$ICON_URL" -o res/icon.png || echo "Icon download failed"
            cp res/icon.png res/icon/android/icon.png
          fi

          # Update config.xml properly
          cat >> config.xml << EOF
            <icon src="res/icon.png" />
          EOF

          # WebView Setup with better iframe
          rm -rf www/*
          cat > www/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
              <title>${APP_NAME}</title>
              <style>
                  body, html { margin:0; padding:0; height:100%; overflow:hidden; background:#000; }
                  iframe { width:100%; height:100%; border:none; }
              </style>
          </head>
          <body>
              <iframe src="${URL}" allowfullscreen></iframe>
          </body>
          </html>
          EOF

          # Build APK
          cordova build android --debug -- --packageType=apk

          # Copy APK
          cp platforms/android/app/build/outputs/apk/debug/app-debug.apk ../${DOC_ID}.apk

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.event.client_payload.docId }}
          name: APK Build - ${{ github.event.client_payload.appName }}
          files: ./${{ github.event.client_payload.docId }}.apk
          draft: false
          prerelease: false

      - name: Update Firebase Firestore
        run: |
          DOC_ID="${{ github.event.client_payload.docId }}"
          DOWNLOAD_URL="https://github.com/limon121765/web-to-apk-compiler/releases/download/apk-$DOC_ID/$DOC_ID.apk"

          curl -X PATCH \
            "https://firestore.googleapis.com/v1/projects/my-app-ae88f/databases/(default)/documents/apk_builds/$DOC_ID?key=AIzaSyAo9ddKYbaCiIz5iwCNJN0pxs3UQvBvrTI&updateMask.fieldPaths=status&updateMask.fieldPaths=downloadUrl" \
            -H "Content-Type: application/json" \
            -d "{
              \"fields\": {
                \"status\": {\"stringValue\": \"completed\"},
                \"downloadUrl\": {\"stringValue\": \"$DOWNLOAD_URL\"}
              }
            }"
        env:
          FIREBASE_API_KEY: "AIzaSyAo9ddKYbaCiIz5iwCNJN0pxs3UQvBvrTI"
