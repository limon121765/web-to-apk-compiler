name: Real Web to APK Builder

on:
  repository_dispatch:
    types: [build-apk]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '11'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create App Environment & Optimize Speed
        run: |
          # যদি আগে থেকে কোনো myapp ফোল্ডার থাকে তা মুছে ফেলা
          rm -rf myapp
          
          # আপনার HTML থেকে পাঠানো ডাটা দিয়ে নতুন কর্ডোভা অ্যাপ তৈরি
          cordova create myapp ${{ github.event.client_payload.packageName }} "${{ github.event.client_payload.appName }}"
          cd myapp
          
          # অ্যান্ড্রোয়েড প্ল্যাটফর্ম যোগ করা
          cordova platform add android@10.1.2 --save
          
          # ওয়েবসাইট ইউআরএল-কে অ্যাপের হোমপেজে রিডাইরেক্ট করা
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0; url=${{ github.event.client_payload.url }}"></head><body></body></html>' > www/index.html

      - name: Inject Start.io SDK Dependency
        run: |
          # 'package com.startapp.sdk.init does not exist' এরর ফিক্স করার মূল ধাপ
          # এটি বিল্ড হওয়ার আগেই build.gradle ফাইলে লাইব্রেরিটি ইনজেক্ট করে দেবে
          sed -i '/dependencies {/a \    implementation "com.startapp:inapp-sdk:5.1.0"' myapp/platforms/android/app/build.gradle

      - name: Compile APK (Gradle Build)
        run: |
          cd myapp
          cordova build android --debug

      - name: Upload APK to GitHub Releases
        id: upload_asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.client_payload.docId }}
          name: "Build: ${{ github.event.client_payload.appName }}"
          files: myapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Firebase Data (Success)
        if: success()
        run: |
          # গিটহাব রিলিজ থেকে ডাইরেক্ট ডাউনলোড লিংক তৈরি
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.event.client_payload.docId }}/app-debug.apk"
          
          # ফায়ারবেস ফায়ারস্টোরে বিল্ড স্ট্যাটাস 'completed' এবং ডাউনলোড ইউআরএল আপডেট করা
          curl -X PATCH "https://firestore.googleapis.com/v1/projects/my-app-ae88f/databases/(default)/documents/apk_builds/${{ github.event.client_payload.docId }}?updateMask.fieldPaths=status&updateMask.fieldPaths=downloadUrl" \
            -H "Content-Type: application/json" \
            -d "{\"fields\": {\"status\": {\"stringValue\": \"completed\"}, \"downloadUrl\": {\"stringValue\": \"$DOWNLOAD_URL\"}}}"

      - name: Update Firebase Data (Failure)
        if: failure()
        run: |
          # বিল্ড ফেইল হলে ফায়ারবেসে স্ট্যাটাস 'failed' আপডেট করা
          curl -X PATCH "https://firestore.googleapis.com/v1/projects/my-app-ae88f/databases/(default)/documents/apk_builds/${{ github.event.client_payload.docId }}?updateMask.fieldPaths=status" \
            -H "Content-Type: application/json" \
            -d "{\"fields\": {\"status\": {\"stringValue\": \"failed\"}}}"
